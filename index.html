<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>STICKMAN.EXE — A Life Simulator</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Nunito:wght@400;600;800&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
</head>
<body>

<div id="app">

  <!-- ── TOP BAR ─────────────────────────────── -->
  <header id="topbar">
    <div id="logo">STICKMAN<span class="blink-slow">.EXE</span></div>
    <div id="world-indicator">
      <span id="world-label">WORLD 1</span>
      <div id="world-dots">
        <span class="wdot active" data-w="0"></span>
        <span class="wdot" data-w="1"></span>
        <span class="wdot" data-w="2"></span>
      </div>
    </div>
    <div id="topbar-controls">
      <button id="btn-cheer"  class="ctrl-btn">😊 Cheer</button>
      <button id="btn-annoy"  class="ctrl-btn">😤 Annoy</button>
      <button id="btn-feed"   class="ctrl-btn">🍖 Feed</button>
      <button id="btn-reset"  class="ctrl-btn danger">↺ Reset</button>
    </div>
  </header>

  <!-- ── CANVAS AREA ────────────────────────── -->
  <div id="canvas-wrap">
    <canvas id="world" width="900" height="420"></canvas>
    <!-- Scanline overlay -->
    <div id="scanlines"></div>
    <!-- Vignette -->
    <div id="vignette"></div>
    <!-- Transition flash -->
    <div id="world-flash"></div>
    <!-- World name overlay -->
    <div id="world-title-overlay" class="hidden"></div>
  </div>

  <!-- ── BOTTOM PANELS ──────────────────────── -->
  <div id="panels">

    <!-- States / Psychology -->
    <div class="panel" id="panel-states">
      <div class="panel-title">🧠 MIND &amp; BODY</div>
      <div class="states-grid">
        <div class="state-item">
          <span class="s-icon">🍖</span>
          <span class="s-name">Hunger</span>
          <div class="s-bar-wrap"><div class="s-bar hunger" id="sb-hunger"></div></div>
          <span class="s-val" id="sv-hunger">0</span>
        </div>
        <div class="state-item">
          <span class="s-icon">⚡</span>
          <span class="s-name">Energy</span>
          <div class="s-bar-wrap"><div class="s-bar energy" id="sb-energy"></div></div>
          <span class="s-val" id="sv-energy">0</span>
        </div>
        <div class="state-item">
          <span class="s-icon">🎲</span>
          <span class="s-name">Boredom</span>
          <div class="s-bar-wrap"><div class="s-bar boredom" id="sb-boredom"></div></div>
          <span class="s-val" id="sv-boredom">0</span>
        </div>
        <div class="state-item">
          <span class="s-icon">😠</span>
          <span class="s-name">Anger</span>
          <div class="s-bar-wrap"><div class="s-bar anger" id="sb-anger"></div></div>
          <span class="s-val" id="sv-anger">0</span>
        </div>
        <div class="state-item">
          <span class="s-icon">😢</span>
          <span class="s-name">Sadness</span>
          <div class="s-bar-wrap"><div class="s-bar sadness" id="sb-sadness"></div></div>
          <span class="s-val" id="sv-sadness">0</span>
        </div>
        <div class="state-item">
          <span class="s-icon">✨</span>
          <span class="s-name">Happy</span>
          <div class="s-bar-wrap"><div class="s-bar happy" id="sb-happy"></div></div>
          <span class="s-val" id="sv-happy">0</span>
        </div>
        <div class="state-item">
          <span class="s-icon">🔍</span>
          <span class="s-name">Curiosity</span>
          <div class="s-bar-wrap"><div class="s-bar curiosity" id="sb-curiosity"></div></div>
          <span class="s-val" id="sv-curiosity">0</span>
        </div>
        <div class="state-item">
          <span class="s-icon">😱</span>
          <span class="s-name">Fear</span>
          <div class="s-bar-wrap"><div class="s-bar fear" id="sb-fear"></div></div>
          <span class="s-val" id="sv-fear">0</span>
        </div>
        <div class="state-item">
          <span class="s-icon">💪</span>
          <span class="s-name">Confidence</span>
          <div class="s-bar-wrap"><div class="s-bar confidence" id="sb-confidence"></div></div>
          <span class="s-val" id="sv-confidence">0</span>
        </div>
      </div>
    </div>

    <!-- Memory Panel -->
    <div class="panel" id="panel-memory">
      <div class="panel-title">📖 MEMORY</div>
      <div id="mem-tabs">
        <button class="mem-tab active" data-tab="stm">STM</button>
        <button class="mem-tab" data-tab="ltm">LTM</button>
        <button class="mem-tab" data-tab="log">LOG</button>
      </div>
      <div id="mem-stm"  class="mem-content active"></div>
      <div id="mem-ltm"  class="mem-content hidden"></div>
      <div id="mem-log"  class="mem-content hidden"></div>
    </div>

    <!-- Letter/Symbol Dictionary -->
    <div class="panel" id="panel-lexicon">
      <div class="panel-title">🔤 LEXICON</div>
      <div id="lexicon-grid"></div>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
